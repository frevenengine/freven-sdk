schema = 1
key = "freven.fixture:families/soil_grass"

[family]
kind = "content_family"
namespace = "freven.fixture"
description = "Soil and grass-covered soil visual family fixture."

[[axes]]
name = "soil"
values = ["dirt", "clay", "sand"]

[[axes]]
name = "grass"
values = ["bare", "covered"]

[[skip]]
soil = "sand"
grass = "covered"
reason = "Grass-covered sand is intentionally not generated by this fixture."

[templates.block]
key = "freven.fixture:blocks/{grass}_{soil}"
display_name = "{Grass} {Soil}"
solid = true
hardness = 0.6

[templates.materials.top]
key = "freven.fixture:materials/block/{grass}_{soil}_top"
base_color_texture = "freven.fixture:textures/block/{grass}_{soil}_top"
fallback_debug_tint_rgba = "6BAA3AFF"

[templates.materials.side]
key = "freven.fixture:materials/block/{grass}_{soil}_side"
base_color_texture = "freven.fixture:textures/block/{grass}_{soil}_side"
fallback_debug_tint_rgba = "6BAA3AFF"

[templates.materials.bottom]
key = "freven.fixture:materials/block/{soil}"
base_color_texture = "freven.fixture:textures/block/{soil}"
fallback_debug_tint_rgba = "8A5A30FF"

[templates.visual]
key = "freven.fixture:visuals/block/{grass}_{soil}"
target = "freven.fixture:blocks/{grass}_{soil}"
model = "freven.core:models/block/cube_faces"
fallback_debug_tint_rgba = "6BAA3AFF"

[templates.visual.materials]
top = "freven.fixture:materials/block/{grass}_{soil}_top"
side = "freven.fixture:materials/block/{grass}_{soil}_side"
bottom = "freven.fixture:materials/block/{soil}"
